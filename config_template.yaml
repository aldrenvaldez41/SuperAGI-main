#####################------------------SYSTEM KEYS-------------------------########################

# PRIMARY LLM — Ollama local (no cost)
# Run on VPS: docker exec -it <ollama_container> ollama pull llama3.1:8b
# If OOM on KVM2 (8GB RAM), switch to: mistral:7b
OPENAI_API_BASE: "http://host.docker.internal:32768/v1"
OPENAI_API_KEY: "ollama"
MODEL_NAME: "llama3.1:8b"
RESOURCES_SUMMARY_MODEL_NAME: "llama3.1:8b"
MAX_TOOL_TOKEN_LIMIT: 800
MAX_MODEL_TOKEN_LIMIT: 4032

# FALLBACK LLM — OpenRouter (generate key at openrouter.ai)
# To activate: comment the Ollama lines above and uncomment these:
# OPENAI_API_BASE: "https://openrouter.ai/api/v1"
# OPENAI_API_KEY: YOUR_OPENROUTER_API_KEY
# MODEL_NAME: "anthropic/claude-3-haiku"

#DATABASE INFO
DB_NAME: super_agi_main
DB_HOST: super__postgres
DB_USERNAME: superagi
DB_PASSWORD: password
DB_URL: postgresql://superagi:password@super__postgres:5432/super_agi_main
REDIS_URL: "super__redis:6379"

#STORAGE
STORAGE_TYPE: "FILE"
TOOLS_DIR: "superagi/tools"
RESOURCES_INPUT_ROOT_DIR: workspace/input/{agent_id}
RESOURCES_OUTPUT_ROOT_DIR: workspace/output/{agent_id}/{agent_execution_id}

#AUTH
ENV: 'DEV'
JWT_SECRET_KEY: 'secret'
expiry_time_hours: 1
FRONTEND_URL: "http://localhost:32800"  # Must match proxy port in docker-compose.yaml

#ENCRYPTION KEY — replace with a random 32-character string for production
ENCRYPTION_KEY: abcdefghijklmnopqrstuvwxyz123456

#####################------------------VECTOR STORE-------------------------########################
# Using existing Qdrant instance on VPS
RESOURCE_VECTOR_STORE: QDRANT
RESOURCE_VECTOR_STORE_INDEX_NAME: superagi_resources
QDRANT_HOST_NAME: host.docker.internal
QDRANT_PORT: 32782
QDRANT_API_KEY: YOUR_QDRANT_API_KEY

#####################------------------TOOLS KEYS-------------------------########################

# SERPER.DEV — Web search (free tier: 2,500 searches/month — sign up at serper.dev)
SERP_API_KEY: YOUR_SERPER_DEV_API_KEY

#####################------------------CUSTOM TOOL ENDPOINTS-------------------------########################

# LIGHTRAG — Graph RAG knowledge base
LIGHTRAG_URL: "http://rag.buildwithaldren.com"

# BROWSERLESS — Headless browser scraping (developer sites only)
BROWSERLESS_URL: "http://browsr.buildwithaldren.com"
BROWSERLESS_TOKEN: YOUR_BROWSERLESS_TOKEN

# N8N — Workflow automation webhooks
N8N_BASE_URL: "http://n8n.buildwithaldren.com"

# TRILIUM NEXT — Note storage (get token from TriliumNext: Options → API tokens)
TRILIUM_URL: "http://notes.buildwithaldren.com"
TRILIUM_TOKEN: YOUR_TRILIUM_API_TOKEN

# POSTIZ — Social media scheduling (get key from Postiz: Settings → API)
POSTIZ_URL: "http://social.buildwithaldren.com"
POSTIZ_API_KEY: YOUR_POSTIZ_API_KEY

# KNOWLEDGE BASE COLLECTIONS
# One collection per developer; use source tags for individual projects (e.g. udho, udtc)
LIGHTRAG_COLLECTION_8990: "8990_holdings"
LIGHTRAG_COLLECTION_COMPETITOR: "competitor_research"
LIGHTRAG_COLLECTION_GENERAL: "general"
